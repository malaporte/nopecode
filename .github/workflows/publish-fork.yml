name: publish-fork

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

env:
  GH_REPO: malaporte/nopecode

jobs:
  release:
    runs-on: ubuntu-24.04
    if: github.repository == 'malaporte/nopecode'
    outputs:
      version: ${{ steps.release.outputs.version }}
      release: ${{ steps.release.outputs.release }}
      tag: ${{ steps.release.outputs.tag }}
      repo: ${{ steps.release.outputs.repo }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/setup-bun

      - name: Ensure release exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(bun -e 'const pkg = await Bun.file("./packages/opencode/package.json").json(); console.log(pkg.version)')
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="v${VERSION}"
          fi
          gh release view "$TAG_NAME" --repo "$GH_REPO" --json tagName,databaseId >/tmp/release.json 2>/dev/null || \
            gh release create "$TAG_NAME" --draft --title "$TAG_NAME" --notes "Automated fork build" --repo "$GH_REPO"
          gh release view "$TAG_NAME" --repo "$GH_REPO" --json tagName,databaseId >/tmp/release.json
          RELEASE_ID=$(jq -r '.databaseId' /tmp/release.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "repo=${GH_REPO}" >> "$GITHUB_OUTPUT"

  build-cli:
    needs: release
    runs-on: macos-latest
    if: github.repository == 'malaporte/nopecode'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: apple-actions/import-codesign-certs@v2
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve signing identity
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-bun

      - name: Remove existing CLI release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view ${{ needs.release.outputs.tag }} --repo ${{ needs.release.outputs.repo }} --json assets |
            jq -r '.assets[].name | select(test("^(opencode|nopecode)-(darwin|linux|windows)-"))' |
            while read -r name; do
              gh release delete-asset ${{ needs.release.outputs.tag }} "$name" --repo ${{ needs.release.outputs.repo }} --yes || true
            done

      - name: Build
        run: ./packages/opencode/script/build.ts
        env:
          OPENCODE_VERSION: ${{ needs.release.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.release.outputs.release }}
          GH_REPO: ${{ needs.release.outputs.repo }}
          GH_TOKEN: ${{ github.token }}
          MACOS_SIGNING_IDENTITY: ${{ env.CERT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: opencode-cli
          path: packages/opencode/dist

  build-tauri:
    needs:
      - build-cli
      - release
    if: github.repository == 'malaporte/nopecode'
    runs-on: ${{ matrix.settings.host }}
    env:
      HAS_APPLE_API: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_PATH != '' }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-2025
            target: x86_64-pc-windows-msvc
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: apple-actions/import-codesign-certs@v2
        if: ${{ runner.os == 'macOS' }}
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve signing identity
        if: ${{ runner.os == 'macOS' }}
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> "$GITHUB_ENV"

      - name: Setup Apple API key
        if: ${{ runner.os == 'macOS' && env.HAS_APPLE_API == 'true' }}
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" > "$RUNNER_TEMP/apple-api-key.p8"

      - name: Export Apple API env
        if: ${{ runner.os == 'macOS' && env.HAS_APPLE_API == 'true' }}
        run: |
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple-api-key.p8" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache apt packages
        if: contains(matrix.settings.host, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: ${{ runner.os }}-${{ matrix.settings.target }}-apt-fork-${{ hashFiles('.github/workflows/publish-fork.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.settings.target }}-apt-fork-

      - name: Install dependencies (ubuntu only)
        if: contains(matrix.settings.host, 'ubuntu')
        run: |
          mkdir -p ~/apt-cache && chmod -R a+rw ~/apt-cache
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends -o dir::cache::archives="$HOME/apt-cache" libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          sudo chmod -R a+rw ~/apt-cache

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          shared-key: ${{ matrix.settings.target }}

      - name: Prepare
        run: |
          cd packages/desktop
          bun ./scripts/prepare.ts
        env:
          OPENCODE_VERSION: ${{ needs.release.outputs.version }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Clear stale dmg mount
        if: ${{ runner.os == 'macOS' }}
        run: hdiutil detach "/Volumes/OpenCode" -force >/dev/null 2>&1 || true

      - name: Resolve tauri portable SHA
        if: contains(matrix.settings.host, 'ubuntu')
        run: echo "TAURI_PORTABLE_SHA=$(git ls-remote https://github.com/tauri-apps/tauri.git refs/heads/feat/truly-portable-appimage | cut -f1)" >> "$GITHUB_ENV"

      - name: Install tauri-cli from portable appimage branch
        uses: taiki-e/cache-cargo-install-action@v3
        if: contains(matrix.settings.host, 'ubuntu')
        with:
          tool: tauri-cli
          git: https://github.com/tauri-apps/tauri
          rev: ${{ env.TAURI_PORTABLE_SHA }}

      - name: Show tauri-cli version
        if: contains(matrix.settings.host, 'ubuntu')
        run: cargo tauri --version

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@390cbe447412ced1303d35abe75287949e43437a
        timeout-minutes: 60
        with:
          projectPath: packages/desktop
          uploadWorkflowArtifacts: true
          tauriScript: ${{ (contains(matrix.settings.host, 'ubuntu') && 'cargo tauri') || '' }}
          args: --target ${{ matrix.settings.target }} --config ./src-tauri/tauri.fork.conf.json --verbose
          updaterJsonPreferNsis: true
          releaseId: ${{ needs.release.outputs.release }}
          tagName: ${{ needs.release.outputs.tag }}
          releaseDraft: true
          releaseAssetNamePattern: opencode-desktop-[platform]-[arch][ext]
          releaseCommitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_BUNDLER_NEW_APPIMAGE_FORMAT: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}

  build-electron:
    needs:
      - build-cli
      - release
    if: github.repository == 'malaporte/nopecode'
    runs-on: ${{ matrix.settings.host }}
    env:
      HAS_APPLE_API: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_PATH != '' }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            platform_flag: --mac --x64
            assets: opencode-electron-mac-x64.dmg,opencode-electron-mac-x64.dmg.blockmap,opencode-electron-mac-x64.zip,opencode-electron-mac-x64.zip.blockmap
          - host: macos-latest
            target: aarch64-apple-darwin
            platform_flag: --mac --arm64
            assets: opencode-electron-mac-arm64.dmg,opencode-electron-mac-arm64.dmg.blockmap,opencode-electron-mac-arm64.zip,opencode-electron-mac-arm64.zip.blockmap
          - host: windows-2025
            target: x86_64-pc-windows-msvc
            platform_flag: --win
            assets: opencode-electron-win-x64.exe,opencode-electron-win-x64.exe.blockmap
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform_flag: --linux
            assets: opencode-electron-linux-x86_64.AppImage,opencode-electron-linux-amd64.deb,opencode-electron-linux-x86_64.rpm
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform_flag: --linux
            assets: opencode-electron-linux-arm64.AppImage,opencode-electron-linux-arm64.deb,opencode-electron-linux-aarch64.rpm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: apple-actions/import-codesign-certs@v2
        if: runner.os == 'macOS'
        with:
          keychain: build
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve signing identity
        if: ${{ runner.os == 'macOS' }}
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "CERT_ID=$CERT_ID" >> "$GITHUB_ENV"

      - name: Setup Apple API key
        if: ${{ runner.os == 'macOS' && env.HAS_APPLE_API == 'true' }}
        run: echo "${{ secrets.APPLE_API_KEY_PATH }}" > "$RUNNER_TEMP/apple-api-key.p8"

      - name: Export Apple API env
        if: ${{ runner.os == 'macOS' && env.HAS_APPLE_API == 'true' }}
        run: |
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple-api-key.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY }}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache apt packages
        if: contains(matrix.settings.host, 'ubuntu')
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: ${{ runner.os }}-${{ matrix.settings.target }}-apt-electron-fork-${{ hashFiles('.github/workflows/publish-fork.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.settings.target }}-apt-electron-fork-

      - name: Install dependencies (ubuntu only)
        if: contains(matrix.settings.host, 'ubuntu')
        run: |
          mkdir -p ~/apt-cache && chmod -R a+rw ~/apt-cache
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends -o dir::cache::archives="$HOME/apt-cache" rpm
          sudo chmod -R a+rw ~/apt-cache

      - name: Prepare
        run: bun ./scripts/prepare.ts
        working-directory: packages/desktop-electron
        env:
          OPENCODE_VERSION: ${{ needs.release.outputs.version }}
          OPENCODE_CHANNEL: prod
          OPENCODE_GH_REPO: ${{ needs.release.outputs.repo }}
          RUST_TARGET: ${{ matrix.settings.target }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Build
        run: bun run build
        working-directory: packages/desktop-electron
        env:
          OPENCODE_CHANNEL: prod

      - name: Remove existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for name in $(echo "${{ matrix.settings.assets }}" | tr ',' ' '); do
            gh release delete-asset ${{ needs.release.outputs.tag }} "$name" --repo ${{ needs.release.outputs.repo }} --yes 2>/dev/null || true
          done

      - name: Package and publish
        run: npx electron-builder ${{ matrix.settings.platform_flag }} --publish always --config electron-builder.config.ts
        working-directory: packages/desktop-electron
        timeout-minutes: 60
        env:
          OPENCODE_CHANNEL: prod
          OPENCODE_GH_REPO: ${{ needs.release.outputs.repo }}
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSC_NAME: ${{ env.CERT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: opencode-electron-${{ matrix.settings.target }}
          path: packages/desktop-electron/dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: latest-yml-${{ matrix.settings.target }}
          path: packages/desktop-electron/dist/latest*.yml

  finalize:
    needs:
      - release
      - build-cli
      - build-tauri
      - build-electron
    runs-on: ubuntu-24.04
    if: github.repository == 'malaporte/nopecode'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/setup-bun

      - uses: actions/download-artifact@v4
        with:
          pattern: latest-yml-*
          path: /tmp/latest-yml

      - name: Finalize updater metadata
        env:
          OPENCODE_VERSION: ${{ needs.release.outputs.version }}
          OPENCODE_RELEASE: ${{ needs.release.outputs.release }}
          GH_REPO: ${{ needs.release.outputs.repo }}
          GH_TOKEN: ${{ github.token }}
          LATEST_YML_DIR: /tmp/latest-yml
        run: |
          bun ./packages/desktop/scripts/finalize-latest-json.ts
          bun ./packages/desktop-electron/scripts/finalize-latest-yml.ts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit ${{ needs.release.outputs.tag }} --draft=false --repo ${{ needs.release.outputs.repo }}
